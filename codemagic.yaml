workflows:
  ios-release:
    name: iOS Release (Manual Signing)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        IOS_BUNDLE_ID: "com.admin.churppyAdmin"
        DEVELOPMENT_TEAM: "7H4229UD7R"
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "ChurppyAdminProvisioningORG"
      groups:
        - ios_signing_credentials
    cache:
      cache_paths:
        - ~/.pub-cache
        - $FCI_BUILD_DIR/build
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true

    scripts:
      - name: Flutter version & deps
        script: |
          flutter --version
          flutter pub get

      - name: Clean build
        script: |
          flutter clean || true

      - name: Build iOS manually signed IPA
        script: |
          echo "🚀 Building IPA with Manual Code Signing..."
          flutter build ipa --release \
            --export-method app-store \
            --bundle-sksl-path sksl.json

          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            PRODUCT_BUNDLE_IDENTIFIER=$IOS_BUNDLE_ID \
            archive -archivePath ../build/Runner.xcarchive
          cd ..

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
