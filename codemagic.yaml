workflows:
  ios-release:
    name: iOS Release (IPA & TestFlight)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        IOS_BUNDLE_ID: "com.admin.churppyAdmin"
        DEVELOPMENT_TEAM: $DEVELOPMENT_TEAM
      groups:
        - ios_signing_credentials
    cache:
      cache_paths:
        - ~/.pub-cache
        - $FCI_BUILD_DIR/build
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Flutter version & deps
        script: |
          flutter --version
          flutter pub get
      - name: Clean previous builds
        script: |
          flutter clean || true
      - name: Build IPA with auto-signing
        script: |
          flutter build ipa --release --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID