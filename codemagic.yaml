workflows:
  ios-release:
    name: iOS Release (Manual Signing)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        IOS_BUNDLE_ID: "com.admin.churppyAdmin"
        DEVELOPMENT_TEAM: "7H4229UD7R"
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "ChurppyAdminProvisioningORG"
      groups:
        - ios_signing_credentials
    cache:
      cache_paths:
        - ~/.pub-cache
        - $FCI_BUILD_DIR/build
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main     # ✅ updated to main branch
          include: true
          source: true

    scripts:
      - name: Flutter version & dependencies
        script: |
          flutter --version
          flutter pub get

      - name: Clean previous builds
        script: |
          flutter clean || true

      - name: Install uploaded signing files
        script: |
          echo "🔑 Installing uploaded .p12 and .mobileprovision profiles..."
          keychain initialize
          keychain add-certificates
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          find /Users/builder/Library/codemagic-cli-tools/provisioning_profiles -name "*.mobileprovision" -exec cp {} "$PROFILES_DIR/" \;
          echo "✅ Installed provisioning profiles:"
          ls "$PROFILES_DIR"

      - name: Build iOS (no codesign yet)
        script: |
          echo "🧩 Preparing Flutter iOS build (no signing yet)..."
          flutter build ios --release --no-codesign

      - name: Archive & export signed IPA
        script: |
          echo "🚀 Archiving and signing IPA manually..."
          cd ios
          rm -rf ios_backup || true  # clean any backup Xcodeproj if present

          # ✅ Archive the build
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            PRODUCT_BUNDLE_IDENTIFIER=$IOS_BUNDLE_ID \
            archive -archivePath ../build/Runner.xcarchive

          # ✅ Export IPA
          xcodebuild -exportArchive \
            -archivePath ../build/Runner.xcarchive \
            -exportOptionsPlist ../ios/ExportOptions.plist \
            -exportPath ../build/ios/ipa

          cd ..

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
