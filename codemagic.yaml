workflows:
  ios-release:
    name: iOS Release (Manual Signing)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        IOS_BUNDLE_ID: "com.admin.churppyAdmin"
        DEVELOPMENT_TEAM: "7H4229UD7R"
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "ChurppyAdminProvisioningORG"
      groups:
        - ios_signing_credentials

    scripts:
      - name: Fetch signing files
        script: |
          echo "🔑 Installing signing certificates and provisioning profiles..."
          keychain initialize
          app-store-connect fetch-signing-files "$IOS_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Flutter setup
        script: |
          flutter --version
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Archive and Export
        script: |
          echo "🚀 Archiving & exporting IPA..."
          cd ios
          xcodebuild clean archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/Runner.xcarchive \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            PRODUCT_BUNDLE_IDENTIFIER=$IOS_BUNDLE_ID

          xcodebuild -exportArchive \
            -archivePath ../build/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ../build/ios/ipa
          cd ..
          ls -la build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
